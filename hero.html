<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Hero Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
        }

        .hero-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .hero-section {
            display: flex;
            flex-direction: row;
            align-items: center;
            max-width: 1200px;
            width: 100%;
            gap: 40px;
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            color: #2d3436;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 15px 35px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .cta-button:hover {
            background-color: #74b9ff;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .hero-section {
                flex-direction: column-reverse;
                text-align: center;
                padding-top: 50px;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .hero-container {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <section class="hero-container">
        <div class="hero-section">
            <div class="hero-content">
                <h1>Modern Solutions for Complex Problems</h1>
                <p>Build scalable applications with ease using our streamlined framework designed for the modern web. Experience speed and flexibility like never before.</p>
                <a href="#" class="cta-button">Get Started Now</a>
            </div>
            <div class="hero-image">
                <img src="https://via.placeholder.com/600x400" alt="Hero Illustration">
            </div>
        </div>
    </section>

</body>
</html>
